name: Build & Release ChroniNotes

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build Tauri app
        run: npm run build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: chroninotes-nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: chroninotes-msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi

  build-macos-intel:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build Tauri app (Intel)
        run: npm run build -- -- --target x86_64-apple-darwin

      - name: Rename DMG for clarity
        run: |
          cd src-tauri/target/x86_64-apple-darwin/release/bundle/dmg
          for f in *.dmg; do
            mv "$f" "${f%.dmg}_x64.dmg"
          done

      - name: Upload DMG (Intel)
        uses: actions/upload-artifact@v4
        with:
          name: chroninotes-dmg-intel
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*_x64.dmg

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build Tauri app (Apple Silicon)
        run: npm run build -- -- --target aarch64-apple-darwin

      - name: Rename DMG for clarity
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/dmg
          for f in *.dmg; do
            mv "$f" "${f%.dmg}_aarch64.dmg"
          done

      - name: Upload DMG (Apple Silicon)
        uses: actions/upload-artifact@v4
        with:
          name: chroninotes-dmg-arm
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*_aarch64.dmg

  release:
    needs: [build-windows, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    steps:
      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: chroninotes-nsis-installer
          path: ./installers

      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: chroninotes-msi-installer
          path: ./installers

      - name: Download macOS Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: chroninotes-dmg-intel
          path: ./installers

      - name: Download macOS ARM DMG
        uses: actions/download-artifact@v4
        with:
          name: chroninotes-dmg-arm
          path: ./installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./installers/*
          generate_release_notes: true
          draft: false
          prerelease: false
